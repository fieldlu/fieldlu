<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280">
      <stop offset="0%" stop-color="#1a0a14"/>
      <stop offset="50%" stop-color="#1a0a1a"/>
      <stop offset="100%" stop-color="#140a1a"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Stars -->
  <g opacity="0.15" fill="#FF69B4">
    <circle cx="200" cy="50" r="1.5"/>
    <circle cx="350" cy="80" r="1"/>
    <circle cx="500" cy="40" r="1.5"/>
    <circle cx="650" cy="70" r="1"/>
    <circle cx="800" cy="45" r="2"/>
    <circle cx="950" cy="65" r="1"/>
    <circle cx="1080" cy="50" r="1.5"/>
    <circle cx="150" cy="200" r="1"/>
    <circle cx="300" cy="220" r="1.5"/>
    <circle cx="980" cy="210" r="1"/>
    <circle cx="1120" cy="190" r="1.5"/>
  </g>

  <!-- Sparkles -->
  <text x="180" y="42" font-size="12" fill="#FF69B4" opacity="0.3">✦</text>
  <text x="480" y="35" font-size="10" fill="#FFB6C1" opacity="0.25">✧</text>
  <text x="780" y="38" font-size="12" fill="#FF69B4" opacity="0.3">✦</text>
  <text x="1050" y="42" font-size="10" fill="#FFB6C1" opacity="0.25">✧</text>
  <text x="280" y="215" font-size="10" fill="#FF69B4" opacity="0.2">✧</text>
  <text x="960" y="205" font-size="12" fill="#FFB6C1" opacity="0.25">✦</text>

  <!-- Heart decoration -->
  <g transform="translate(1050, 140)" opacity="0.1">
    <path d="M0,10 C0,0 -10,-10 -20,-5 C-30,0 -30,15 -20,20 C-10,25 0,30 0,30 C0,30 10,25 20,20 C30,15 30,0 20,-5 C10,-10 0,0 0,10Z" fill="#FF69B4" transform="scale(0.6)"/>
  </g>

  <!-- Cat ears -->
  <g transform="translate(155, 100)" opacity="0.25" fill="none" stroke="#FF69B4" stroke-width="1.5">
    <path d="M0,20 L-12,-8 L-4,12Z"/>
    <path d="M30,20 L42,-8 L34,12Z"/>
  </g>

  <!-- Main text -->
  <text x="200" y="135" font-family="Fira Code, monospace" font-size="36" font-weight="bold" fill="#FFB6C1" filter="url(#glow)">✦ fieldlu ✦</text>
  <text x="200" y="180" font-family="Fira Code, monospace" font-size="18" fill="#D8A0C8">code with love, build with magic ~☆</text>

  <!-- Bottom hearts -->
  <text x="600" y="260" font-size="14" fill="#FF69B4" opacity="0.08" text-anchor="middle">♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥ ♥</text>
</svg>
