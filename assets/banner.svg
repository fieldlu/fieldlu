<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#00FF88">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="40" y1="0" x2="40" y2="280"/>
    <line x1="80" y1="0" x2="80" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
  </g>

  <!-- Prompt symbol -->
  <text x="100" y="135" font-family="Fira Code, monospace" font-size="32" fill="#00FF88" filter="url(#glow)">❯</text>

  <!-- Main text -->
  <text x="155" y="135" font-family="Fira Code, monospace" font-size="36" font-weight="bold" fill="#E6EDF3">fieldlu</text>
  <text x="155" y="180" font-family="Fira Code, monospace" font-size="18" fill="#8B949E">builder  ·  scripter  ·  automation enthusiast</text>

  <!-- Decorative right bar -->
  <circle cx="1100" cy="60" r="3" fill="#00FF88" opacity="0.4"/>
  <circle cx="1100" cy="80" r="1.5" fill="#00FF88" opacity="0.3"/>
  <circle cx="1100" cy="100" r="2" fill="#00FF88" opacity="0.35"/>

  <line x1="1050" y1="200" x2="1150" y2="200" stroke="#00FF88" stroke-width="0.5" opacity="0.2"/>
  <line x1="1070" y1="210" x2="1130" y2="210" stroke="#00FF88" stroke-width="0.3" opacity="0.15"/>
</svg>
