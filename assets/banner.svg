<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280">
      <stop offset="0%" stop-color="#FFF0F5"/>
      <stop offset="40%" stop-color="#FFE4EC"/>
      <stop offset="70%" stop-color="#FFD6E7"/>
      <stop offset="100%" stop-color="#FFECF2"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF69B4"/>
      <stop offset="100%" stop-color="#FF1493"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Cherry blossom petals (sakura) -->
  <g opacity="0.25">
    <text x="50" y="60" font-size="16" fill="#FFB6C1">🌸</text>
    <text x="300" y="45" font-size="14" fill="#FF69B4">🌸</text>
    <text x="550" y="70" font-size="18" fill="#FFB6C1">🌸</text>
    <text x="800" y="35" font-size="12" fill="#FF69B4">🌸</text>
    <text x="1050" y="55" font-size="16" fill="#FFB6C1">🌸</text>
    <text x="150" y="230" font-size="14" fill="#FF69B4">🌸</text>
    <text x="950" y="240" font-size="12" fill="#FFB6C1">🌸</text>
  </g>

  <!-- Stars -->
  <g opacity="0.4">
    <text x="120" y="50" font-size="12" fill="#FF1493">✦</text>
    <text x="420" y="40" font-size="10" fill="#FF69B4">✧</text>
    <text x="680" y="30" font-size="14" fill="#FF1493">✦</text>
    <text x="920" y="48" font-size="10" fill="#FF69B4">✧</text>
    <text x="1130" y="42" font-size="12" fill="#FF1493">✦</text>
    <text x="230" y="240" font-size="10" fill="#FF69B4">✧</text>
    <text x="1030" y="235" font-size="12" fill="#FF1493">✦</text>
  </g>

  <!-- Cute ribbon/bow -->
  <g transform="translate(140, 100)" opacity="0.5">
    <path d="M0,15 C-15,0 -20,-15 -5,-20 C5,-22 10,-15 10,-15 C10,-15 5,-22 15,-20 C30,-15 25,0 10,15 Z" fill="#FF69B4"/>
    <circle cx="5" cy="-8" r="3" fill="#FFB6C1"/>
  </g>

  <!-- Main text -->
  <text x="200" y="135" font-family="Fira Code, monospace" font-size="36" font-weight="bold" fill="#FF1493" filter="url(#glow)">🌸 fieldlu 🌸</text>
  <text x="200" y="180" font-family="Fira Code, monospace" font-size="18" fill="#D87093">♡ code with love, build with magic ~☆</text>

  <!-- Bottom hearts row -->
  <text x="600" y="255" font-size="13" fill="#FFB6C1" opacity="0.5" text-anchor="middle">♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡ ♡</text>
</svg>
